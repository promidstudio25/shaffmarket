<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShaffMarket — Digital & Affiliate Store</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #080c14;
  --surface: #0e1420;
  --card: #131b2a;
  --card2: #192032;
  --border: rgba(255,255,255,0.07);
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --text: #e8eaf0;
  --muted: #6b7a99;
  --white: #ffffff;
  --glow: 0 0 40px rgba(0,212,255,0.15);
  --radius: 16px;
  --radius-sm: 10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:10px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(8,12,20,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:70px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#fff}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--white)}
.logo-text span{color:var(--accent)}
.nav-links{display:flex;gap:4px;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;padding:8px 14px;border-radius:8px;transition:.2s;letter-spacing:.3px}
.nav-links a:hover,.nav-links a.active{color:var(--white);background:rgba(255,255,255,0.07)}
.nav-right{display:flex;align-items:center;gap:12px}
.btn-admin{background:linear-gradient(135deg,var(--accent2),#6d28d9);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
.btn-admin:hover{opacity:.85;transform:translateY(-1px)}
.cart-btn{position:relative;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;font-size:16px}
.cart-btn:hover{background:rgba(0,212,255,0.1);border-color:var(--accent)}
.cart-count{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#000;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* HERO */
.hero{padding:120px 24px 60px;max-width:1400px;margin:0 auto;position:relative}
.hero-bg{position:absolute;top:0;left:0;right:0;height:500px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,212,255,0.08) 0%,transparent 70%);pointer-events:none}
.hero-content{text-align:center;position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.25);color:var(--accent);padding:7px 16px;border-radius:50px;font-size:12px;font-weight:600;letter-spacing:.5px;margin-bottom:24px;text-transform:uppercase}
.hero-badge i{font-size:10px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-family:'Syne',sans-serif;font-size:clamp(36px,6vw,72px);font-weight:800;line-height:1.05;color:var(--white);margin-bottom:20px}
h1 .gradient{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--muted);font-size:17px;max-width:540px;margin:0 auto 40px;line-height:1.7}
.hero-ctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0098b8);color:#000;border:none;padding:13px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,0.35)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);padding:13px 28px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.05)}

/* STATS */
.stats-bar{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:20px 24px;margin-bottom:0}
.stats-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:center;gap:60px;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--white)}
.stat-num span{color:var(--accent)}
.stat-label{font-size:12px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* MAIN CONTENT */
.main{max-width:1400px;margin:0 auto;padding:40px 24px}

/* SECTION HEADERS */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.section-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--white);display:flex;align-items:center;gap:12px}
.section-title .badge{background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:11px;font-weight:700;padding:4px 10px;border-radius:50px;color:#fff;letter-spacing:.5px}
.section-title .badge.hot{background:linear-gradient(135deg,#ef4444,#f97316)}
.section-title .badge.sale{background:linear-gradient(135deg,var(--green),#059669)}
.see-all{color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;display:flex;align-items:center;gap:5px;transition:.2s}
.see-all:hover{gap:9px}

/* CATEGORY FILTER */
.cat-filter{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:32px;scrollbar-width:none}
.cat-filter::-webkit-scrollbar{display:none}
.cat-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.2s;font-family:'DM Sans',sans-serif}
.cat-btn:hover,.cat-btn.active{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent)}

/* PRODUCT GRID */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}

/* PRODUCT CARD */
.product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:.3s;position:relative;cursor:pointer}
.product-card:hover{transform:translateY(-5px);border-color:rgba(0,212,255,0.2);box-shadow:0 20px 40px rgba(0,0,0,0.4),var(--glow)}
.card-img{position:relative;overflow:hidden;height:200px;background:var(--card2)}
.card-img img{width:100%;height:100%;object-fit:cover;transition:.4s}
.product-card:hover .card-img img{transform:scale(1.05)}
.card-badges{position:absolute;top:10px;left:10px;display:flex;gap:6px;flex-direction:column}
.badge-tag{font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;letter-spacing:.4px;text-transform:uppercase}
.badge-tag.bestseller{background:#f59e0b;color:#000}
.badge-tag.discount{background:var(--red);color:#fff}
.badge-tag.digital{background:var(--accent2);color:#fff}
.badge-tag.affiliate{background:var(--accent);color:#000}
.badge-tag.new{background:var(--green);color:#fff}
.card-actions{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:6px;opacity:0;transition:.2s;transform:translateX(10px)}
.product-card:hover .card-actions{opacity:1;transform:translateX(0)}
.action-btn{background:rgba(8,12,20,0.85);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;font-size:13px;backdrop-filter:blur(10px)}
.action-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.action-btn.wishlisted{color:var(--red);background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3)}
.card-source{position:absolute;bottom:10px;right:10px;background:rgba(8,12,20,0.85);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;color:var(--muted);backdrop-filter:blur(10px)}
.card-body{padding:16px}
.card-store{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500;display:flex;align-items:center;gap:5px}
.card-store i{color:var(--accent);font-size:10px}
.card-title{font-size:14px;font-weight:600;color:var(--white);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-rating{display:flex;align-items:center;gap:5px;margin-bottom:10px}
.stars{color:var(--accent3);font-size:11px}
.rating-num{font-size:12px;color:var(--muted)}
.review-count{font-size:11px;color:var(--muted)}
.card-price{display:flex;align-items:flex-end;gap:8px;margin-bottom:12px}
.price-main{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--white)}
.price-original{font-size:13px;color:var(--muted);text-decoration:line-through}
.price-discount{font-size:12px;color:var(--green);font-weight:700}
.card-footer{display:flex;gap:8px}
.btn-buy{flex:1;background:linear-gradient(135deg,var(--accent),#0098b8);color:#000;border:none;padding:10px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
.btn-buy:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,212,255,0.3)}
.btn-view{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:9px;font-size:13px;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
.btn-view:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}

/* HORIZONTAL SCROLL SECTION */
.scroll-container{display:flex;gap:20px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.scroll-container::-webkit-scrollbar{display:none}
.scroll-container .product-card{min-width:240px;flex-shrink:0}

/* BANNER */
.promo-banners{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:40px 0}
.promo-card{border-radius:var(--radius);padding:32px;position:relative;overflow:hidden;cursor:pointer;transition:.3s}
.promo-card:hover{transform:translateY(-3px)}
.promo-card.blue{background:linear-gradient(135deg,#0c1a3a,#0d2060);border:1px solid rgba(0,212,255,0.2)}
.promo-card.purple{background:linear-gradient(135deg,#1a0c3a,#2d1060);border:1px solid rgba(124,58,237,0.2)}
.promo-card h3{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;margin-bottom:8px}
.promo-card p{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:20px}
.promo-glow{position:absolute;right:-30px;top:-30px;width:200px;height:200px;border-radius:50%;opacity:.15}
.promo-card.blue .promo-glow{background:var(--accent)}
.promo-card.purple .promo-glow{background:var(--accent2)}

/* ADMIN PANEL */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:2000;display:none;backdrop-filter:blur(8px)}
.admin-overlay.open{display:flex;align-items:center;justify-content:center}
.admin-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:90%;max-width:680px;max-height:90vh;overflow-y:auto;padding:32px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.modal-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white)}
.modal-close{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s}
.modal-close:hover{background:var(--red);border-color:var(--red);color:#fff}
.form-group{margin-bottom:20px}
.form-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:13px 16px;border-radius:var(--radius-sm);font-size:14px;font-family:'DM Sans',sans-serif;transition:.2s;outline:none}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,0.1)}
.form-input::placeholder{color:var(--muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-select{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:13px 16px;border-radius:var(--radius-sm);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.form-select option{background:var(--card)}
.url-parse-area{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;position:relative}
.parse-status{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;font-weight:600}
.parse-status.loading{color:var(--accent)}
.parse-status.success{color:var(--green)}
.parse-status.error{color:var(--red)}
.parsed-preview{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-top:16px;display:none}
.parsed-preview.show{display:flex;gap:14px;align-items:flex-start}
.parsed-img{width:80px;height:80px;border-radius:8px;object-fit:cover;flex-shrink:0}
.parsed-info{flex:1}
.parsed-title{font-size:14px;font-weight:600;color:var(--white);margin-bottom:4px}
.parsed-price{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent);margin-bottom:4px}
.parsed-source{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.form-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px}
.form-check input{width:16px;height:16px;accent-color:var(--accent)}
.btn-save{width:100%;background:linear-gradient(135deg,var(--accent2),#6d28d9);color:#fff;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.2s;margin-top:8px}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(124,58,237,0.35)}
.btn-parse{background:linear-gradient(135deg,var(--accent),#0098b8);color:#000;border:none;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;position:absolute;right:12px;top:12px;font-family:'DM Sans',sans-serif;transition:.2s}
.btn-parse:hover{opacity:.85}

/* PRODUCT DETAIL MODAL */
.product-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:none;backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:24px}
.product-overlay.open{display:flex}
.product-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;position:relative}
.product-modal-inner{display:grid;grid-template-columns:1fr 1fr;gap:0}
.product-modal-img{position:relative;overflow:hidden;border-radius:20px 0 0 20px;min-height:400px}
.product-modal-img img{width:100%;height:100%;object-fit:cover}
.product-modal-body{padding:32px;overflow-y:auto}
.modal-store{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.modal-store i{color:var(--accent)}
.modal-product-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white);margin-bottom:12px;line-height:1.3}
